version: 2
updates:
  # Cargo workspace (incrementalmerkletree, incrementalmerkletree-testing,
  # shardtree).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # bridgetree is excluded from the workspace and has its own lockfile.
  - package-ecosystem: "cargo"
    directory: "/bridgetree"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
